name: Medicine App CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: medicine_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Validate PHP Syntax
        run: find . -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Install Dependencies (if composer used)
        run: |
          if [ -f composer.json ]; then
            composer install --no-progress --no-suggest
          fi

      - name: Import Database
        run: |
          sudo apt-get install -y mysql-client
          mysql -h 127.0.0.1 -u root -proot medicine_db < database.sql

      - name: Deploy (Example Step)
        run: echo "Deployment step can be added here"
